<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <meta name="description" content="A sleek multi-room real-time chat app built with Flask and Socket.IO.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%235eead4'/%3E%3Cstop offset='100%25' stop-color='%2360a5fa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='%230b1120'/%3E%3Cpath d='M18 20h28a6 6 0 0 1 6 6v12a6 6 0 0 1-6 6H33l-9 8v-8H18a6 6 0 0 1-6-6V26a6 6 0 0 1 6-6Z' fill='url(%23g)'/%3E%3Ccircle cx='24' cy='32' r='3' fill='%230b1120'/%3E%3Ccircle cx='32' cy='32' r='3' fill='%230b1120'/%3E%3Ccircle cx='40' cy='32' r='3' fill='%230b1120'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    {% block content %}{% endblock %}
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
      window.APP_CONFIG = {
        appName: {{ app_name|tojson }},
        rooms: {{ rooms|tojson }},
        maxMessageLength: {{ max_message_length|tojson }},
        maxUsernameLength: {{ max_username_length|tojson }},
      };
    </script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
  </body>
</html>
